<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>White Room — WebXR</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #d8dee0; height: 100%; }
  #info {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    font: 13px/1.4 -apple-system, system-ui, sans-serif;
    color: #444; background: rgba(255,255,255,0.85);
    padding: 8px 12px; border-radius: 4px; pointer-events: none;
    max-width: 320px;
  }
</style>
</head>
<body>
<div id="info">White Room — tap "Enter VR" on Quest 3 browser.</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd8dee0);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 200);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const W = 50, H = 3, D = 50;

// --- Procedural panel/grid texture ---
function makeTileTexture(repeatX, repeatY, baseColor = '#c8d0d2', lineColor = '#2a2a2a') {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = lineColor;
  ctx.fillRect(0, 0, 3, size); // left edge
  ctx.fillRect(0, 0, size, 3); // top edge
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  tex.anisotropy = 8;
  return tex;
}

const WALL_TILE = 2;   // wall panels 2m × 1.5m
const WALL_TILE_V = 1.5;
const FLOOR_TILE = 5;  // floor tiles 5m × 5m

// Walls (cool soft gray panels, reference-photo look)
const wallMatNS = new THREE.MeshStandardMaterial({
  color: 0xffffff, roughness: 0.95, metalness: 0.0,
  map: makeTileTexture(W / WALL_TILE, H / WALL_TILE_V)
});
const wallMatEW = new THREE.MeshStandardMaterial({
  color: 0xffffff, roughness: 0.95, metalness: 0.0,
  map: makeTileTexture(D / WALL_TILE, H / WALL_TILE_V)
});
const wallGeoNS = new THREE.PlaneGeometry(W, H);
const wallGeoEW = new THREE.PlaneGeometry(D, H);
const wallN = new THREE.Mesh(wallGeoNS, wallMatNS); wallN.position.set(0, H/2, -D/2); scene.add(wallN);
const wallS = new THREE.Mesh(wallGeoNS, wallMatNS); wallS.position.set(0, H/2, D/2); wallS.rotation.y = Math.PI; scene.add(wallS);
const wallE = new THREE.Mesh(wallGeoEW, wallMatEW); wallE.position.set(W/2, H/2, 0); wallE.rotation.y = -Math.PI/2; scene.add(wallE);
const wallW = new THREE.Mesh(wallGeoEW, wallMatEW); wallW.position.set(-W/2, H/2, 0); wallW.rotation.y = Math.PI/2; scene.add(wallW);

// Floor — same panel grid, slightly darker
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(W, D),
  new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.9,
    map: makeTileTexture(W / FLOOR_TILE, D / FLOOR_TILE, '#bac2c4', '#2a2a2a')
  })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// LED grid ceiling — glowing panels separated by thin dark grid lines
const TILES_X = 25;
const TILES_Z = 25;
const FRAME = 0.04;

const tileW = W / TILES_X;
const tileD = D / TILES_Z;
const panelW = tileW - FRAME;
const panelD = tileD - FRAME;

// Dark frame backing (the grid lines) — sits HIGHER (further from viewer)
const frame = new THREE.Mesh(
  new THREE.PlaneGeometry(W, D),
  new THREE.MeshBasicMaterial({ color: 0x2a2a2a, side: THREE.DoubleSide })
);
frame.position.set(0, H, 0);
frame.rotation.x = Math.PI / 2;
scene.add(frame);

// Glowing panels — sit LOWER (closer to viewer looking up)
const panelMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
const panelGeo = new THREE.PlaneGeometry(panelW, panelD);
for (let i = 0; i < TILES_X; i++) {
  for (let j = 0; j < TILES_Z; j++) {
    const x = -W/2 + tileW/2 + i * tileW;
    const z = -D/2 + tileD/2 + j * tileD;
    const panel = new THREE.Mesh(panelGeo, panelMat);
    panel.position.set(x, H - 0.01, z);
    panel.rotation.x = -Math.PI / 2;
    scene.add(panel);
  }
}

// Lighting — bright diffuse from above
scene.add(new THREE.HemisphereLight(0xffffff, 0xbac2c4, 1.6));
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const fill = new THREE.DirectionalLight(0xffffff, 0.4);
fill.position.set(0, H, 0);
fill.target.position.set(0.5, 0, 0.5);
scene.add(fill, fill.target);

renderer.setAnimationLoop(() => renderer.render(scene, camera));

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
