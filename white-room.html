<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>White Room — WebXR</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #d8dee0; height: 100%; }
  #info {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    font: 13px/1.4 -apple-system, system-ui, sans-serif;
    color: #444; background: rgba(255,255,255,0.85);
    padding: 8px 12px; border-radius: 4px; pointer-events: none;
    max-width: 320px;
  }
</style>
</head>
<body>
<div id="info">White Room — tap "Enter VR" on Quest 3 browser.</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd8dee0);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 200);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const W = 50, H = 3, D = 50;

// --- Procedural wall texture: irregular panel grid (architectural metal look) ---
function makeWallTexture(widthM, heightM, seed) {
  const pxPerMeter = 40;
  const cw = Math.round(widthM * pxPerMeter);
  const ch = Math.round(heightM * pxPerMeter);
  const canvas = document.createElement('canvas');
  canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext('2d');

  // Base metallic grey
  ctx.fillStyle = '#c4ccce';
  ctx.fillRect(0, 0, cw, ch);

  // Subtle top-light gradient
  const grad = ctx.createLinearGradient(0, 0, 0, ch);
  grad.addColorStop(0, 'rgba(255,255,255,0.18)');
  grad.addColorStop(0.55, 'rgba(255,255,255,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  // Seeded random
  let s = seed;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };

  const lineColor = '#1a1a1a';
  const lineW = 2;
  const mPx = cw / widthM;

  // Vertical columns of varying widths, each with its own horizontal subdivisions
  let x = 0;
  while (x < cw) {
    const colW = Math.min((1.6 + rand() * 2.8) * mPx, cw - x);
    let y = 0;
    while (y < ch) {
      const rowH = Math.min((0.7 + rand() * 1.1) * mPx, ch - y);
      // Subtle per-panel brightness variation for brushed-metal feel
      const v = (rand() - 0.5) * 14;
      ctx.fillStyle = `rgba(${196+v|0}, ${204+v|0}, ${206+v|0}, 1)`;
      ctx.fillRect(x, y, colW, rowH);
      // Re-apply gradient over this panel
      ctx.fillStyle = grad;
      ctx.globalAlpha = 0.6;
      ctx.fillRect(x, y, colW, rowH);
      ctx.globalAlpha = 1;
      // Horizontal reveal line at top of panel (skip very first row)
      if (y > 0) { ctx.fillStyle = lineColor; ctx.fillRect(x, y - lineW/2, colW, lineW); }
      y += rowH;
    }
    // Vertical reveal line at left edge of column (skip very first)
    if (x > 0) { ctx.fillStyle = lineColor; ctx.fillRect(x - lineW/2, 0, lineW, ch); }
    x += colW;
  }

  // Fine brushed-metal noise
  const noise = ctx.getImageData(0, 0, cw, ch);
  for (let i = 0; i < noise.data.length; i += 4) {
    const n = (rand() - 0.5) * 6;
    noise.data[i]   = Math.max(0, Math.min(255, noise.data[i]   + n));
    noise.data[i+1] = Math.max(0, Math.min(255, noise.data[i+1] + n));
    noise.data[i+2] = Math.max(0, Math.min(255, noise.data[i+2] + n));
  }
  ctx.putImageData(noise, 0, 0);

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

// Clean tileable floor (subtle large tiles)
function makeFloorTexture(repeatX, repeatY) {
  const size = 512;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#aeb6b8';
  ctx.fillRect(0, 0, size, size);
  // Subtle radial sheen
  const grad = ctx.createRadialGradient(size*0.4, size*0.3, 0, size*0.5, size*0.5, size*0.7);
  grad.addColorStop(0, 'rgba(255,255,255,0.10)');
  grad.addColorStop(1, 'rgba(0,0,0,0.04)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  // Reveal lines (top + left)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, 3, size);
  ctx.fillRect(0, 0, size, 3);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  tex.anisotropy = 8;
  return tex;
}

const FLOOR_TILE = 5;

// Walls — brushed-metal look, irregular panel layout, different seed per wall
function wallMat(widthM, seed) {
  return new THREE.MeshStandardMaterial({
    color: 0xffffff,
    metalness: 0.35,
    roughness: 0.55,
    map: makeWallTexture(widthM, H, seed)
  });
}
const wallGeoNS = new THREE.PlaneGeometry(W, H);
const wallGeoEW = new THREE.PlaneGeometry(D, H);
const wallN = new THREE.Mesh(wallGeoNS, wallMat(W, 17)); wallN.position.set(0, H/2, -D/2); scene.add(wallN);
const wallS = new THREE.Mesh(wallGeoNS, wallMat(W, 83)); wallS.position.set(0, H/2, D/2); wallS.rotation.y = Math.PI; scene.add(wallS);
const wallE = new THREE.Mesh(wallGeoEW, wallMat(D, 41)); wallE.position.set(W/2, H/2, 0); wallE.rotation.y = -Math.PI/2; scene.add(wallE);
const wallW = new THREE.Mesh(wallGeoEW, wallMat(D, 127)); wallW.position.set(-W/2, H/2, 0); wallW.rotation.y = Math.PI/2; scene.add(wallW);

// Floor — clean, large tiles, subtle sheen
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(W, D),
  new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.7, metalness: 0.2,
    map: makeFloorTexture(W / FLOOR_TILE, D / FLOOR_TILE)
  })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// LED grid ceiling — glowing panels separated by thin dark grid lines
const TILES_X = 25;
const TILES_Z = 25;
const FRAME = 0.04;

const tileW = W / TILES_X;
const tileD = D / TILES_Z;
const panelW = tileW - FRAME;
const panelD = tileD - FRAME;

// Dark frame backing (the grid lines) — sits HIGHER (further from viewer)
const frame = new THREE.Mesh(
  new THREE.PlaneGeometry(W, D),
  new THREE.MeshBasicMaterial({ color: 0x2a2a2a, side: THREE.DoubleSide })
);
frame.position.set(0, H, 0);
frame.rotation.x = Math.PI / 2;
scene.add(frame);

// Glowing panels — sit LOWER (closer to viewer looking up)
const panelMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
const panelGeo = new THREE.PlaneGeometry(panelW, panelD);
for (let i = 0; i < TILES_X; i++) {
  for (let j = 0; j < TILES_Z; j++) {
    const x = -W/2 + tileW/2 + i * tileW;
    const z = -D/2 + tileD/2 + j * tileD;
    const panel = new THREE.Mesh(panelGeo, panelMat);
    panel.position.set(x, H - 0.01, z);
    panel.rotation.x = -Math.PI / 2;
    scene.add(panel);
  }
}

// Lighting — bright diffuse from above
scene.add(new THREE.HemisphereLight(0xffffff, 0xbac2c4, 1.6));
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const fill = new THREE.DirectionalLight(0xffffff, 0.4);
fill.position.set(0, H, 0);
fill.target.position.set(0.5, 0, 0.5);
scene.add(fill, fill.target);

renderer.setAnimationLoop(() => renderer.render(scene, camera));

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
